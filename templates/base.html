<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Tales of Bharat{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page">
  <div class="eyebrow">A Mythology Quiz</div>

  {% if session.get('username') %}
  <div class="nav">
    <span class="nav-user">{{ session['username'] }}</span>
    <a href="{{ url_for('leaderboard') }}">Leaderboard</a>
    <a href="{{ url_for('logout') }}">Log out</a>
  </div>
  {% endif %}

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">
        {% for m in messages %}<div>{{ m }}</div>{% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="card">
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
