{% extends "base.html" %}
{% block title %}Tales of Bharat — Choose Your Path{% endblock %}
{% block content %}
<h1>Choose Your Path</h1>
<p class="subtitle">Pick a domain and a difficulty to begin your round.</p>

{% if not categories %}
  <p class="lb-empty">No questions available yet.</p>
{% else %}
<form method="POST" action="{{ url_for('setup') }}">
  <label class="field-label" for="category">Domain</label>
  <select id="category" name="category" required>
    {% for cat in categories %}
      <option value="{{ cat }}">{{ cat }}</option>
    {% endfor %}
  </select>

  <label class="field-label" for="difficulty" style="margin-top:16px;">Difficulty</label>
  <select id="difficulty" name="difficulty" required>
    {% for diff in difficulty_order %}
      <option value="{{ diff }}">{{ diff | capitalize }}</option>
    {% endfor %}
  </select>

  <button type="submit" class="btn btn-primary">Begin Round →</button>
</form>
{% endif %}
{% endblock %}
